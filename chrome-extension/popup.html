<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Meter</title><script src=lang.js></script><script src=theme-config.js></script><script src=theme-effects.js></script><script src=theme-ui.js></script><style>*{margin:0;padding:0;box-sizing:border-box}body{width:380px;min-height:200px;background:linear-gradient(135deg,#0d0705,#1f1008 50%,#0d0705 100%);color:#fceabb;font-family:system-ui,sans-serif;padding:12px;text-align:center}.c{font-size:40px;animation:catWave 2.6s ease-in-out infinite;cursor:pointer}@keyframes catWave{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}.n{font-size:42px;font-weight:800;background:linear-gradient(180deg,#fff3d6,#f8b500 45%,#e67e22);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.s{font-size:11px;color:#c9a96e;margin:2px 0}.t{font-size:22px;font-weight:700;color:#f9d976;font-variant-numeric:tabular-nums}.b{display:flex;gap:4px;justify-content:center;margin-top:6px}.btn{width:32px;height:32px;border:1px solid rgba(255,215,150,0.15);border-radius:50%;background:rgba(255,215,150,0.06);color:#c9a96e;font-size:13px;cursor:pointer}</style></head><body><div class=c id=cat onclick="tapCat()">🐱</div><div><span class=n id=amountInt>0</span><span id=amountDec>.00</span></div><div class=s id=sb>● Grindin'</div><div class=t id=cd>00:00:00</div><div class=s id=cdL>⏳ Until Done</div><div class=b><button class=btn onclick="toggleSlack()">😴</button><button class=btn onclick="showProPopup()">💎</button><button class=btn onclick="openSet()">⚙️</button></div><script>var AC=null,slack=false,S={salary:10000,sH:9,sM:0,eH:18,eM:0,lH:1,wd:[1,2,3,4,5],mwd:22};try{var r=localStorage.getItem("salarySet");if(r)Object.assign(S,JSON.parse(r))}catch(e){}function calc(){var n=new Date(),w=S.wd.includes(n.getDay()),sm=S.sH*60+S.sM,em=S.eH*60+S.eM,lm=S.lH*60,ms=n.getHours()*60+n.getMinutes(),pms=S.salary/S.mwd/8/60/60,d=w?S.salary/S.mwd:0,e=0,r=0,st="rest";if(w){var no=sm+(em-sm-lm)/2,ls=no-lm/2,le=no+lm/2;if(ms<sm)st="before";else if(ms<ls){st=slack?"slack":"working";e=(ms-sm)*pms;r=(em-ms)*1000}else if(ms<le){st="lunch";e=(ls-sm)*pms;r=(em-ms)*1000}else if(ms<em){st=slack?"slack":"working";e=(ms-sm-lm)*pms;r=(em-ms)*1000}else{st="after";e=d;r=0}}if(e>d)e=d;if(r<0)r=0;if(e<0)e=0;return{earn:e,daily:d,rem:r,st:st,w:w}}function u(){var r=calc(),{earn:d,rem:r2,st:s,w:w}=r;if(!slack){var ip=Math.floor(d),dp=(d-ip).toFixed(8).slice(2);document.getElementById("amountInt").textContent=ip.toLocaleString();document.getElementById("amountDec").textContent="."+dp}var sb=document.getElementById("sb"),cd=document.getElementById("cd"),cl=document.getElementById("cdL");var m={lunch:"● Lunch",after:"● Done!",rest:"● Off",slack:"● Slacking",wk:"● Grindin\u0027"};sb.textContent=s==="lunch"?m.lunch:s==="after"?m.after:!w?m.rest:slack?m.slack:m.wk;sb.className="s "+(s==="lunch"||s==="after"||!w?"rs":slack?"sl":"wk");if(slack)cd.textContent="⏸️";else if(s==="after")cd.textContent="🎉";else if(s==="rest")cd.textContent="🎉";else{var ts=Math.floor(r2/1000);cd.textContent=String(Math.floor(ts/3600)).padStart(2,"0")+":"+String(Math.floor((ts%3600)/60)).padStart(2,"0")+":"+String(ts%60).padStart(2,"0")}}function toggleSlack(){slack=!slack}function tapCat(){var c=document.getElementById("cat");c.style.transform="scale(1.3)";setTimeout(function(){c.style.transform=""},200)}function openSet(){var s=prompt("Salary:",S.salary);if(s&&!isNaN(s)){S.salary=parseFloat(s);localStorage.setItem("salarySet",JSON.stringify(S))}}function showProPopup(){alert("Coming soon!")}function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC}function playDing(){try{var c=ac(),o=c.createOscillator(),g=c.createGain();o.type="sine";o.frequency.setValueAtTime(1200,c.currentTime);g.gain.setValueAtTime(0.06,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+0.2)}catch(e){}}initTheme();u();setInterval
