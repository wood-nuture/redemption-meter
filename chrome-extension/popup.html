<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redemption Meter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;min-height:200px;background:linear-gradient(135deg,#0d0705,#1f1008 50%,#0d0705 100%);color:#fceabb;font-family:system-ui,sans-serif;padding:16px;text-align:center}
.c{font-size:40px;cursor:pointer;transition:transform 0.15s;margin-bottom:2px}
.c:active{transform:scale(1.3)}
.n{font-size:42px;font-weight:800;background:linear-gradient(180deg,#fff3d6,#f8b500 45%,#e67e22);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-variant-numeric:tabular-nums}
.dc{font-size:16px;font-weight:600;background:linear-gradient(180deg,#fff3d6 0%,#f8b500 45%,#e67e22 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.st{font-size:11px;color:#c9a96e;margin:4px 0;min-height:16px}
.tm{font-size:22px;font-weight:700;color:#f9d976;font-variant-numeric:tabular-nums;margin:4px 0}
.tl{font-size:10px;color:rgba(201,169,110,0.4);margin-bottom:4px}
.br{display:flex;gap:6px;justify-content:center;margin-top:8px}
.btn{width:36px;height:36px;border:1px solid rgba(255,215,150,0.15);border-radius:50%;background:rgba(255,215,150,0.06);color:#c9a96e;font-size:14px;cursor:pointer;transition:0.2s;display:flex;align-items:center;justify-content:center}
.btn:hover{background:rgba(255,215,150,0.12);color:#f9d976}
.sb{display:inline-block;padding:1px 10px;border-radius:20px;font-size:10px}
.sb.wk{background:rgba(76,175,80,0.12);color:#81c784}
.sb.rs{background:rgba(255,152,0,0.1);color:#ffb74d}
.sb.sl{background:rgba(100,150,255,0.12);color:#7c9cf0}
</style>
</head>
<body>
<div class="c" id="cat">🐱</div>
<div><span class="n" id="amt">0</span><span class="dc" id="dec">.00</span></div>
<div class="st"><span class="sb wk" id="sb">● Ready</span></div>
<div class="tm" id="cd">00:00:00</div>
<div class="tl" id="cdL">⏳ Loading...</div>
<div class="br">
  <div class="btn" id="slackBtn">😴</div>
  <div class="btn" id="setBtn">⚙️</div>
</div>

<script>
(function(){
  var S={salary:10000,sH:9,sM:0,eH:18,eM:0,lH:1,wd:[1,2,3,4,5],mwd:22};
  try{var r=localStorage.getItem('salarySet');if(r)Object.assign(S,JSON.parse(r))}catch(e){}
  
  var slack=false,lastInt=-1;
  var CD=document.getElementById('cd'),CL=document.getElementById('cdL');
  var SB=document.getElementById('sb'),AMT=document.getElementById('amt');
  var DEC=document.getElementById('dec'),CAT=document.getElementById('cat');
  
  function calc(){
    var n=new Date(),w=S.wd.includes(n.getDay());
    var sm=S.sH*60+S.sM,em=S.eH*60+S.eM,lm=S.lH*60,ms=n.getHours()*60+n.getMinutes();
    var pms=S.salary/S.mwd/8/60/60,d=w?S.salary/S.mwd:0,e=0,r=0,wrk=0,st='rest';
    if(w){
      var no=sm+(em-sm-lm)/2,ls=no-lm/2,le=no+lm/2;
      if(ms<sm)st='before';
      else if(ms<ls){st=slack?'slack':'working';wrk=ms-sm;e=wrk*pms;r=(em-ms)*1000}
      else if(ms<le){st='lunch';e=(ls-sm)*pms;r=(em-ms)*1000}
      else if(ms<em){st=slack?'slack':'working';wrk=ms-sm-lm;e=wrk*pms;r=(em-ms)*1000}
      else{st='after';e=d;r=0}
    }
    if(e>d)e=d;if(r<0)r=0;if(e<0)e=0;
    return{earn:e,daily:d,rem:r,st:st,w:w};
  }
  
  function fmt(ms){
    if(ms<=0)return'00:00:00';
    var ts=Math.floor(ms/1000);
    return String(Math.floor(ts/3600)).padStart(2,'0')+':'+
           String(Math.floor((ts%3600)/60)).padStart(2,'0')+':'+
           String(ts%60).padStart(2,'0');
  }
  
  function upd(){
    var r=calc(),{earn:d,rem:r2,st:s,w:w}=r;
    var ip=Math.floor(d),dp=(d-ip).toFixed(8).slice(2);
    AMT.textContent=ip.toLocaleString();DEC.textContent='.'+dp;
    
    var label='● Ready',cls='wk';
    if(s==='lunch'){label='● Lunch';cls='rs'}
    else if(s==='after'){label='● Done!';cls='rs'}
    else if(!w){label='● Off';cls='rs'}
    else if(slack){label='● Slacking';cls='sl'}
    else if(s==='working'||s==='before'){label="● Grindin'";cls='wk'}
    SB.textContent=label;SB.className='sb '+cls;
    
    if(slack){CD.textContent="⏸️ "+fmt(r2);CL.textContent="😴 Slacking"}
    else if(s==='after'){CD.textContent="🎉 Done!";CL.textContent="⏳ See you tomorrow"}
    else if(!w){CD.textContent="🎉 Day Off";CL.textContent="⏳ Enjoy!"}
    else if(s==='before'){CD.textContent=fmt(r2);CL.textContent="⏳ Until work"}
    else{CD.textContent=fmt(r2);CL.textContent="⏳ Until done"}
  }
  
  // Event listeners (no inline onclick)
  CAT.addEventListener('click',function(){CAT.style.transform='scale(1.3)';setTimeout(function(){CAT.style.transform=''},200)});
  document.getElementById('slackBtn').addEventListener('click',function(){slack=!slack;upd()});
  document.getElementById('setBtn').addEventListener('click',function(){
    var s=prompt('Monthly Salary (pre-tax):',S.salary);
    if(s&&!isNaN(s)){S.salary=parseFloat(s);localStorage.setItem('salarySet',JSON.stringify(S));upd()}
  });
  
  upd();
  setInterval(upd,1000);
})();
</script>
</body>
</html>
